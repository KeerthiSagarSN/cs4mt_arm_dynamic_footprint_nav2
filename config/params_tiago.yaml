# CORESENSE RAMP — TIAGo configuration

navigation_cognition_master:
  ros__parameters:
    flows: [arm_footprint_flow]
    arm_footprint_flow: [arm_footprint_cognitive_module]

arm_footprint_cognitive_module:
  ros__parameters:
    core: arm_footprint_cognitive_core
    afferent: arm_footprint_input
    efferent: arm_footprint_output
    meta: ""
    coupling: ""

    # TIAGo has a circular base
    use_circular_base:   true
    base_radius:         0.30
    base_circle_samples: 16

    # Not used when use_circular_base: true
    base_half_x: 0.30
    base_half_y: 0.30

    safety_padding:   0.05
    update_period_ms: 50
    base_frame:       "base_footprint"
    segment_samples:  8
    service_update_every_n_ticks: 10

    arm_links:
      - "torso_lift_link"
      - "arm_1_link"
      - "arm_2_link"
      - "arm_3_link"
      - "arm_4_link"
      - "arm_5_link"
      - "arm_6_link"
      - "arm_7_link"
      - "arm_tool_link"
      - "wrist_ft_link"
      - "wrist_ft_tool_link"
      - "gripper_link"
      - "gripper_right_finger_link"
      - "gripper_left_finger_link"

    link_radii:
      - 0.12   # torso_lift_link
      - 0.10   # arm_1_link
      - 0.09   # arm_2_link
      - 0.08   # arm_3_link
      - 0.08   # arm_4_link
      - 0.07   # arm_5_link
      - 0.07   # arm_6_link
      - 0.06   # arm_7_link
      - 0.05   # arm_tool_link
      - 0.05   # wrist_ft_link
      - 0.05   # wrist_ft_tool_link
      - 0.08   # gripper_link
      - 0.04   # gripper_right_finger_link
      - 0.04   # gripper_left_finger_link

    arm_footprint_input:
      topics: ["/joint_states"]
      types: ["sensor_msgs/msg/JointState"]

    arm_footprint_output:
      topics: ["/local_costmap/footprint", "/global_costmap/footprint"]
      types: ["geometry_msgs/msg/Polygon", "geometry_msgs/msg/Polygon"]
